<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Asquarespace for R1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0f12;color:#fff;font-family:-apple-system,system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center;gap:16px}
h1{color:#ef4027;font-size:24px}
p{color:#8899aa;font-size:14px;max-width:400px;line-height:1.5}
#qr{background:#fff;padding:16px;border-radius:12px;display:inline-block}
#qr canvas{display:block}
.steps{text-align:left;max-width:400px;font-size:13px;line-height:1.6;color:#c0c8d0}
.steps li{margin:6px 0}
.steps a{color:#ef4027}
.footer{color:#667788;font-size:11px;margin-top:8px}
</style>
</head>
<body>
<h1>Asquarespace for R1</h1>
<p>Your infinite Mindspace — now on Rabbit R1</p>

<div id="qr"></div>

<div class="steps">
  <strong>Install:</strong>
  <ol>
    <li>Open the <strong>Creations</strong> card on your R1</li>
    <li>Tap <strong>Add via QR code</strong></li>
    <li>Scan the QR code above</li>
  </ol>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
const url = location.origin + location.pathname.replace(/r1-install\.html$/, '') + 'r1.html';
new QRCode(document.getElementById('qr'), {
  text: url,
  width: 200,
  height: 200,
  colorDark: '#0d0f12',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.H,
});
</script>
</body>
</html>
