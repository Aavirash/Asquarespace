<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240, initial-scale=1.0, user-scalable=no">
<title>ASQ Feed</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:240px;height:282px;overflow:hidden;background:#0d0f12;color:#fff;font-family:-apple-system,system-ui,sans-serif;user-select:none;-webkit-user-select:none}
body{position:relative}
#view{position:absolute;inset:0;display:none;background:#0d0f12}
#img-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
#img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
#img-wrap img.pixel{filter:blur(24px);transform:scale(1.08)}
#img-wrap img.reveal{filter:blur(0);transform:scale(1);transition:filter .4s ease,transform .4s ease}
#counter{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,.5);z-index:2;background:rgba(0,0,0,.5);padding:2px 8px;border-radius:8px;pointer-events:none}
#ss-badge{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(255,255,255,.3);z-index:2;display:none;letter-spacing:1px;text-transform:uppercase;pointer-events:none}
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:5;background:#0d0f12}
#loading .spinner{width:20px;height:20px;border:2px solid #3a424e;border-top-color:#ef4027;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:10px;color:#667788}
#empty{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:5;background:#0d0f12}
#empty p{font-size:12px;color:#667788}
#empty .emoji{font-size:28px}
#error{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;font-size:11px;color:#DF5A5A;z-index:6;background:rgba(0,0,0,.85)}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Loading feed…</p></div>

<div id="view">
  <div id="img-wrap"><img id="main-img" src="" alt=""></div>
  <div id="counter"></div>
  <div id="ss-badge">✦ Screensaver</div>
</div>

<div id="empty"><div class="emoji">🖼</div><p>No images in your grid yet</p></div>

<div id="error"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
'use strict';

var SUPABASE_URL = 'https://seceezshzzkxoqllbosw.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_9uq_CY2KsPns9dtogTVbyA_5wlvxA3e';

var viewEl = document.getElementById('view');
var loadingEl = document.getElementById('loading');
var emptyEl = document.getElementById('empty');
var errorEl = document.getElementById('error');
var mainImg = document.getElementById('main-img');
var imgWrap = document.getElementById('img-wrap');
var counterEl = document.getElementById('counter');
var ssBadge = document.getElementById('ss-badge');

var items = [];
var currentIdx = 0;
var ssTimer = null;
var ssActive = false;
var supabase = null;

function esc(s) {
  var d = document.createElement('div');
  d.textContent = String(s || '');
  return d.innerHTML;
}

function showError(msg) {
  errorEl.innerHTML = '<p>' + esc(msg) + '</p>';
  errorEl.style.display = 'flex';
  loadingEl.style.display = 'none';
  viewEl.style.display = 'none';
  emptyEl.style.display = 'none';
}

function showEmpty() {
  emptyEl.style.display = 'flex';
  loadingEl.style.display = 'none';
  viewEl.style.display = 'none';
}

// --- Image loading with pixel effect ---

function getItemSrc(item) {
  return item.freshSrc || item.src || '';
}

function loadImage(idx) {
  if (!items.length || idx < 0 || idx >= items.length) return;
  currentIdx = idx;
  var item = items[idx];
  var src = getItemSrc(item);
  if (!src) return;

  mainImg.className = 'pixel';
  mainImg.src = '';
  mainImg.alt = '';

  requestAnimationFrame(function() {
    mainImg.src = src;
    mainImg.alt = esc(item.title || '');
    mainImg.onload = function() {
      mainImg.className = 'reveal';
    };
    mainImg.onerror = function() {
      mainImg.className = '';
      mainImg.style.objectFit = 'contain';
      mainImg.alt = 'Load failed';
    };
  });

  counterEl.textContent = (idx + 1) + ' / ' + items.length;
}

function preloadNext(idx) {
  var next = (idx + 1) % items.length;
  var src = getItemSrc(items[next]);
  if (!src) return;
  var img = new Image();
  img.src = src;
}

function showPrev() {
  if (!items.length) return;
  ssStop();
  var idx = (currentIdx - 1 + items.length) % items.length;
  loadImage(idx);
  preloadNext(idx);
}

function showNext() {
  if (!items.length) return;
  ssStop();
  var idx = (currentIdx + 1) % items.length;
  loadImage(idx);
  preloadNext(idx);
}

// --- Screensaver ---

function ssStart() {
  if (ssActive || items.length < 2) return;
  ssActive = true;
  ssBadge.style.display = 'block';
  ssTimer = setInterval(function() {
    var idx;
    do { idx = Math.floor(Math.random() * items.length); } while (idx === currentIdx && items.length > 1);
    loadImage(idx);
  }, 3000);
}

function ssStop() {
  if (!ssActive) return;
  ssActive = false;
  ssBadge.style.display = 'none';
  if (ssTimer) { clearInterval(ssTimer); ssTimer = null; }
}

function ssToggle() {
  if (ssActive) ssStop();
  else ssStart();
}

// --- R1 Custom Events ---

window.addEventListener('scrollUp', showPrev);
window.addEventListener('scrollDown', showNext);
window.addEventListener('sideClick', ssToggle);

// Desktop keyboard fallback
document.addEventListener('keydown', function(e) {
  if (viewEl.style.display !== 'block') return;
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { showPrev(); e.preventDefault(); }
  else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { showNext(); e.preventDefault(); }
  else if (e.key === 'Enter' || e.key === ' ') { ssToggle(); e.preventDefault(); }
});

// --- Init ---

async function init() {
  if (!window.supabase || !window.supabase.createClient) {
    showError('Supabase library failed to load');
    return;
  }

  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: false }
  });

  try {
    var res = await supabase.rpc('get_asq_feed', { p_email: 'asquareportal@gmail.com' });
    if (res.error) throw res.error;

    var raw = res.data || [];
    if (!raw || !raw.length) { showEmpty(); return; }

    // Only items with a cloudPath (cloud-synced) — include image/gif/video or untyped
    var cloudItems = raw.filter(function(it) {
      if (!it || !it.cloudPath) return false;
      var t = (it.mediaType || '').toLowerCase();
      return t === 'image' || t === 'gif' || t === 'video' || t === '';
    });

    if (!cloudItems.length) { showEmpty(); return; }

    // Refresh signed URLs for all items in parallel
    var BUCKET = 'asq-media';
    var TTL = 60 * 60 * 24 * 30; // 30 days

    var urlResults = await Promise.all(cloudItems.map(function(item) {
      return supabase.storage.from(BUCKET).createSignedUrl(item.cloudPath, TTL)
        .then(function(r) { return { item: item, result: r }; })
        .catch(function() { return { item: item, result: { data: null } }; });
    }));

    items = [];
    urlResults.forEach(function(entry) {
      var signed = entry.result && entry.result.data && entry.result.data.signedUrl;
      if (signed) {
        entry.item.freshSrc = signed;
        items.push(entry.item);
      } else if (entry.item.src && entry.item.src.indexOf('http') === 0) {
        // Fallback: use original src (might be a permanent external URL)
        items.push(entry.item);
      }
    });

    if (!items.length) { showError('Could not load any images. Try refreshing signed URLs in the main app.'); return; }

    viewEl.style.display = 'block';
    loadingEl.style.display = 'none';

    loadImage(0);
    preloadNext(0);
  } catch (e) {
    showError('Failed to load: ' + (e.message || e));
  }
}

init().catch(function(e) {
  showError('Init failed: ' + (e.message || e));
});

})();
</script>
</body>
</html>
