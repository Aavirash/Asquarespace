<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240, initial-scale=1.0, user-scalable=no">
<title>ASQ Feed</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:240px;height:282px;overflow:hidden;background:#0d0f12;color:#fff;font-family:-apple-system,system-ui,sans-serif;user-select:none;-webkit-user-select:none}
body{position:relative}
#view{position:absolute;inset:0;display:none;background:#0d0f12}
#img-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#13161b}
#img-wrap img{width:100%;height:100%;object-fit:contain;display:block}
#counter{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,255,255,.5);z-index:2;background:rgba(0,0,0,.5);padding:2px 8px;border-radius:8px;pointer-events:none;transition:opacity .3s}
#ss-badge{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(255,255,255,.5);z-index:2;display:none;letter-spacing:1px;text-transform:uppercase;pointer-events:none;opacity:0;transition:opacity .8s ease}
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:5;background:#0d0f12}
#loading .spinner{width:20px;height:20px;border:2px solid #3a424e;border-top-color:#ef4027;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:10px;color:#667788}
#empty{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:5;background:#0d0f12}
#empty p{font-size:12px;color:#667788}
#empty .emoji{font-size:28px}
#error{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;font-size:11px;color:#DF5A5A;z-index:6;background:rgba(0,0,0,.85)}
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:5;background:#0d0f12}
#loading .spinner{width:20px;height:20px;border:2px solid #3a424e;border-top-color:#ef4027;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:10px;color:#667788}
#empty{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:5;background:#0d0f12}
#empty p{font-size:12px;color:#667788}
#empty .emoji{font-size:28px}
#error{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;font-size:11px;color:#DF5A5A;z-index:6;background:rgba(0,0,0,.85)}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Loading feed…</p></div>

<div id="view">
  <div id="img-wrap"><img id="main-img" src="" alt=""></div>
  <div id="counter"></div>
  <div id="ss-badge">✦ Screensaver</div>
</div>

<div id="empty"><div class="emoji">🖼</div><p>No images in your grid yet</p></div>

<div id="error"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
'use strict';

var SUPABASE_URL = 'https://seceezshzzkxoqllbosw.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_9uq_CY2KsPns9dtogTVbyA_5wlvxA3e';

var viewEl = document.getElementById('view');
var loadingEl = document.getElementById('loading');
var emptyEl = document.getElementById('empty');
var errorEl = document.getElementById('error');
var mainImg = document.getElementById('main-img');
var imgWrap = document.getElementById('img-wrap');
var counterEl = document.getElementById('counter');
var ssBadge = document.getElementById('ss-badge');

var items = [];
var currentIdx = 0;
var ssTimer = null;
var ssActive = false;
var ssBadgeTimer = null;
var supabase = null;

function esc(s) {
  var d = document.createElement('div');
  d.textContent = String(s || '');
  return d.innerHTML;
}

function showError(msg) {
  errorEl.innerHTML = '<p>' + esc(msg) + '</p>';
  errorEl.style.display = 'flex';
  loadingEl.style.display = 'none';
  viewEl.style.display = 'none';
  emptyEl.style.display = 'none';
}

function showEmpty() {
  emptyEl.style.display = 'flex';
  loadingEl.style.display = 'none';
  viewEl.style.display = 'none';
}

// --- Image loading with pixel reveal effect ---

function getItemSrc(item) {
  return item.freshSrc || item.src || '';
}

function loadImage(idx) {
  if (!items.length || idx < 0 || idx >= items.length) return;
  currentIdx = idx;
  var item = items[idx];
  var src = getItemSrc(item);
  if (!src) return;

  // Preload in hidden Image, then show with pixel blur→reveal
  var preloader = new Image();
  preloader.onload = function() {
    mainImg.style.opacity = '0';
    mainImg.src = src;
    mainImg.alt = esc(item.title || '');
    void mainImg.offsetWidth; // force reflow
    mainImg.style.transition = 'none';
    mainImg.style.filter = 'blur(24px)';
    mainImg.style.transform = 'scale(1.08)';
    mainImg.style.opacity = '1';

    requestAnimationFrame(function() {
      mainImg.style.transition = 'filter .5s ease-out, transform .5s ease-out';
      mainImg.style.filter = 'blur(0)';
      mainImg.style.transform = 'scale(1)';
      // Clean up inline styles after transition
      setTimeout(function() {
        mainImg.style.transition = '';
        mainImg.style.filter = '';
        mainImg.style.transform = '';
      }, 600);
    });
  };
  preloader.onerror = function() {
    mainImg.style.opacity = '1';
    mainImg.src = src;
    mainImg.alt = 'Load failed';
  };
  preloader.src = src;

  counterEl.textContent = (idx + 1) + ' / ' + items.length;
}

function preloadNext(idx) {
  var next = (idx + 1) % items.length;
  var src = getItemSrc(items[next]);
  if (!src) return;
  var img = new Image();
  img.src = src;
}

function showPrev() {
  if (!items.length) return;
  ssStop();
  var idx = (currentIdx - 1 + items.length) % items.length;
  loadImage(idx);
  preloadNext(idx);
}

function showNext() {
  if (!items.length) return;
  ssStop();
  var idx = (currentIdx + 1) % items.length;
  loadImage(idx);
  preloadNext(idx);
}

// --- Screensaver ---

function ssStart() {
  if (ssActive || items.length < 2) return;
  ssActive = true;

  // Hide counter in screensaver mode
  counterEl.style.opacity = '0';

  // Show badge briefly then fade
  ssBadge.style.display = 'block';
  ssBadge.style.opacity = '0';
  void ssBadge.offsetWidth;
  ssBadge.style.opacity = '1';
  clearTimeout(ssBadgeTimer);
  ssBadgeTimer = setTimeout(function() {
    ssBadge.style.opacity = '0';
    setTimeout(function() { ssBadge.style.display = 'none'; }, 800);
  }, 2000);

  ssTimer = setInterval(function() {
    var idx;
    do { idx = Math.floor(Math.random() * items.length); } while (idx === currentIdx && items.length > 1);
    loadImage(idx);
  }, 6000);
}

function ssStop() {
  if (!ssActive) return;
  ssActive = false;
  counterEl.style.opacity = '1';
  clearTimeout(ssBadgeTimer);
  ssBadge.style.display = 'none';
  if (ssTimer) { clearInterval(ssTimer); ssTimer = null; }
}

function ssToggle() {
  if (ssActive) ssStop();
  else ssStart();
}

// --- R1 Custom Events ---

var scrollThrottle = 0;
function throttled(fn) { return function() {
  var now = Date.now();
  if (now - scrollThrottle < 400) return;
  scrollThrottle = now;
  fn();
};}

window.addEventListener('scrollUp', throttled(showPrev));
window.addEventListener('scrollDown', throttled(showNext));
window.addEventListener('sideClick', ssToggle);

// Desktop keyboard fallback
document.addEventListener('keydown', function(e) {
  if (viewEl.style.display !== 'block') return;
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { showPrev(); e.preventDefault(); }
  else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { showNext(); e.preventDefault(); }
  else if (e.key === 'Enter' || e.key === ' ') { ssToggle(); e.preventDefault(); }
});

// --- Init ---

async function init() {
  if (!window.supabase || !window.supabase.createClient) {
    showError('Supabase library failed to load');
    return;
  }

  var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: false }
  });

  try {
    var res = await client.rpc('get_asq_feed', { p_email: 'asquareportal@gmail.com' });
    if (res.error) throw res.error;

    var raw = res.data || [];
    if (!raw || !raw.length) { showEmpty(); return; }

    // Build items array: use public URL for cloud-stored files, original src for others
    items = [];
    raw.forEach(function(it) {
      if (!it) return;
      var t = (it.mediaType || '').toLowerCase();
      if (t !== 'image' && t !== 'gif' && t !== 'video' && t !== '') return;

      if (it.cloudPath) {
        // Public URL — requires bucket to be public:
        //   UPDATE storage.buckets SET public = true WHERE id = 'asq-media';
        it.freshSrc = SUPABASE_URL + '/storage/v1/object/public/asq-media/' + it.cloudPath;
      } else if (it.src && it.src.indexOf('http') === 0) {
        it.freshSrc = it.src;
      } else {
        return; // no usable URL
      }
      items.push(it);
    });

    if (!items.length) { showError('No usable images found. Make the asq-media bucket public in Supabase.'); return; }

    viewEl.style.display = 'block';
    loadingEl.style.display = 'none';

    loadImage(0);
    preloadNext(0);
  } catch (e) {
    showError('Failed to load: ' + (e.message || e));
  }
}

init().catch(function(e) {
  showError('Init failed: ' + (e.message || e));
});

})();
</script>
</body>
</html>
