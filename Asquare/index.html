<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Asquare</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
    <video id="camera-preview" autoplay playsinline muted></video>

    <div id="launch-screen" class="launch-screen">
        <div class="launch-title">Asquare</div>
        <div id="camera-name" class="camera-name">Detecting cameras...</div>
        <div class="launch-actions">
            <button id="start-btn" class="btn primary">Start Camera</button>
            <button id="next-btn" class="btn">Next Camera</button>
        </div>
        <div id="launch-status" class="launch-status"></div>
    </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
